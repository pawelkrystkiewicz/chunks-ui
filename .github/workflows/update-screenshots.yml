name: Update Visual Regression Screenshots

on:
  workflow_dispatch:

env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  AUTHOR_NAME: 'github-actions[bot]'
  AUTHOR_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'

jobs:
  update-screenshots:
    runs-on: ubuntu-24.04

    if: github.ref_name != github.event.repository.default_branch

    concurrency:
      group: visual-regression-screenshots@${{ github.ref_name }}
      cancel-in-progress: true

    permissions:
      contents: write

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Configure Git
        run: |
          git config --global user.name "$AUTHOR_NAME"
          git config --global user.email "$AUTHOR_EMAIL"
        env:
          AUTHOR_NAME: ${{ env.AUTHOR_NAME }}
          AUTHOR_EMAIL: ${{ env.AUTHOR_EMAIL }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Browsers
        run: bun x playwright install --with-deps chromium

      - name: Update Visual Regression Screenshots
        run: cd packages/ui && bun run test:visual -- --update

      - name: Check for changes
        id: check_changes
        run: |
          CHANGED_FILES=$(git status --porcelain | awk '{print $2}')
          if [ "${CHANGED_FILES:+x}" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"

            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "changed_count=$(echo "$CHANGED_FILES" | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add -A
          ACTOR="${{ github.actor }}"
          ACTOR_ID="${{ github.actor_id }}"
          git commit -m "test: update visual regression screenshots" -m "Co-authored-by: ${ACTOR} <${ACTOR_ID}+${ACTOR}@users.noreply.github.com>"

      - name: Push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: git push origin ${{ github.ref_name }}

      - name: Summary
        if: always()
        run: |
          CHANGES="${{ steps.check_changes.outputs.changes }}"
          if [[ "$CHANGES" == "true" ]]; then
            CHANGED_COUNT="${{ steps.check_changes.outputs.changed_count }}"
            BRANCH="${{ github.ref_name }}"
            echo "### Visual Regression Screenshots Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Updated **${CHANGED_COUNT}** screenshot(s) on \`${BRANCH}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No Screenshot Updates Required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All screenshots are already up to date." >> $GITHUB_STEP_SUMMARY
          fi
