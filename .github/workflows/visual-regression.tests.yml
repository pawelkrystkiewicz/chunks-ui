name: Visual Regression Tests
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
jobs:
  visual-regression-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Visual Regression Tests
        run: cd packages/ui && bun run test:visual

      - name: Upload diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs
          path: packages/ui/.vitest-attachments
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify Slack on Success
        if: success() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_ID }}"
            text: "Visual Regression Tests passed on main branch\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"

      - name: Notify Slack on Failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_ID }}"
            text: "Visual Regression Tests failed on main branch\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
